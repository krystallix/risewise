services:
  web:
    image: node:20-alpine
    working_dir: /app
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - PORT=3000
      - NODE_ENV=development
    command: sh -c "corepack enable pnpm && pnpm install && pnpm dev"
